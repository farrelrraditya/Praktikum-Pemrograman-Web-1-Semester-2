<!DOCTYPE html>
<html>
<head>
    <title>Data Praktikan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
<script>
    var jawab = confirm("Apakah anda praktikan PPW1?");
    if(jawab == true){
        var nama = prompt("Masukkan Nama:");
        var nim = prompt("Masukkan NIM:");
        var angkatan = prompt("Masukkan Angkatan:");
        document.write(`
            <h2>Data Praktikan PPW1</h2>

            <table class="table table-bordered">
                <tr>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Angkatan</th>
                </tr>

                <tr>
                    <td>${nama}</td>
                    <td>${nim}</td>
                    <td>${angkatan}</td>
                </tr>
            </table>
        `);
    } else {
        document.write(
            "<h3>Anda bukan praktikan PPW1, anda tidak boleh masuk!</h3>"
        );
    }
</script>
</body>
</html>
