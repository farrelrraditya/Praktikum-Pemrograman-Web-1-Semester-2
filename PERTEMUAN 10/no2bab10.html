<!DOCTYPE html>
<html>
<head>
    <title>Output Javascript</title>
</head>

<body>

    <h2>Macam-Macam Output Javascript</h2>
    <div id="hasil"></div>

    <script>
        // console.log()
        console.log("Ini output console.log");
        // alert()
        alert("Ini output alert");
        // document.write()
        document.write("<p>Ini output document.write()</p>");
        // innerHTML
        document.getElementById("hasil").innerHTML =
        "<b>Ini output innerHTML</b>";
    </script>

</body>
</html>
